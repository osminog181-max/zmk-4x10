include:
    
  - board: nice_nano_v2
    shield: dongle
    cmake-args:
      -DCONFIG_ZMK_SPLIT=y
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
      -DCONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1
      #-DCONFIG_ZMK_STUDIO=y

  - board: nice_nano_v2
    shield: 4x10
    cmake-args:
     -DCONFIG_ZMK_SPLIT=y
     -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  - board: nice_nano_v2
    shield: settings_reset
